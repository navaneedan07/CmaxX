name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend deps
        run: npm ci --prefix backend

      - name: Install frontend deps
        run: npm ci --prefix frontend

      - name: Lint frontend
        run: npm run --prefix frontend lint

      - name: Build frontend
        run: npm run --prefix frontend build

      - name: Syntax check backend
        run: find backend -type f -name "*.js" ! -path "*/node_modules/*" -print0 | xargs -0 -n1 node --check

      - name: Backend smoke check
        env:
          PORT: 3001
          NODE_ENV: production
        run: |
          node backend/server.js &
          SERVER_PID=$!
          sleep 3
          curl -f http://127.0.0.1:3001/health
          kill $SERVER_PID
